# HTTP
quarkus.http.port=8080

# Datasource kind (shared across profiles)
quarkus.datasource.db-kind=postgresql

# Prod datasource (URLs come from environment variables; see docker-compose.yml)
%prod.quarkus.datasource.reactive.url=${QUARKUS_DATASOURCE_REACTIVE_URL}
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Health
quarkus.smallrye-health.root-path=/q/health

# Metrics — Prometheus endpoint at /q/metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
# Percentile histograms are configured via MetricsConfiguration (MeterFilter bean)

# Dev Services — enabled in dev/test, disabled in prod
%prod.quarkus.devservices.enabled=false

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG
