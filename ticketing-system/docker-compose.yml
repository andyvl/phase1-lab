services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: vertx-reactive:postgresql://postgres:5432/ticketing
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/ticketing
      QUARKUS_DATASOURCE_USERNAME: ticketing
      QUARKUS_DATASOURCE_PASSWORD: ticketing
    volumes:
      - gclogs:/work/gc-logs   # GC log files written by -Xlog:gc* in the Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus — scrapes /q/metrics every 5 s
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1h
    depends_on:
      - app

  # Grafana — anonymous admin, pre-provisioned datasource + dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafanadata:
  gclogs:
